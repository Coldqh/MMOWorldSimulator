name: Deploy MMO World Simulator

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          package-manager-cache: false

      - name: Verify portable toolchain and lockfile
        run: |
          node --version
          npm --version
          test "$(npm config get registry)" = "https://registry.npmjs.org/"
          if grep -R "applied-caas-gateway1.internal.api.openai.org" package-lock.json; then
            echo "package-lock.json contains a private registry URL"
            exit 1
          fi

      - name: Install dependencies
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache-${{ github.run_id }}-${{ github.run_attempt }}
        run: npm ci --include=dev --no-audit --no-fund --prefer-online

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
